<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gerenciar Usuários</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://atitudegrupo.com.br/wp-content/uploads/2026/05/LogoAtitude-.png" alt="Atitude Serviço" class="sidebar-logo" />
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/dashboard}" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a th:href="@{/custos/novo}" class="nav-item">
                <i class="fas fa-plus-circle"></i> Novo Custo
            </a>
            <a th:href="@{/admin/usuarios}" class="nav-item active">
                <i class="fas fa-users-cog"></i> Usuários
            </a>
            <a th:href="@{/unidade-servico}" class="nav-item">
                <i class="fas fa-id-badge"></i> Unidade de Serviço
            </a>
            <a th:href="@{/fardamento-estoque}" class="nav-item">
                <i class="fas fa-tshirt"></i> Fardamento
            </a>
            <a th:href="@{/logout}" class="nav-item nav-item-logout"
               onclick="return confirm('Deseja sair?')">
                <i class="fas fa-sign-out-alt"></i> Sair
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <h2><i class="fas fa-users-cog"></i> Gerenciar Usuários</h2>
            <a th:href="@{/admin/usuarios/novo}" class="btn btn-primary btn-sm">
                <i class="fas fa-user-plus"></i> Novo Usuário
            </a>
        </div>

        <div class="alert alert-success" th:if="${sucesso}" th:text="${sucesso}"></div>
        <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>

        <div class="card">
            <div class="card-body table-responsive">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Perfil</th>
                        <th>Status</th>
                        <th>Criado em</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.nome}"></td>
                        <td><code th:text="${u.username}"></code></td>
                        <td th:text="${u.email}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.role.name() == 'SUPER_ADMIN'} ? 'badge-admin' : 'badge-user'"
                                  th:text="${u.role.name() == 'SUPER_ADMIN'} ? 'Super Admin' : 'Usuário'">
                            </span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${u.ativo} ? 'badge-success' : 'badge-danger'"
                                  th:text="${u.ativo} ? 'Ativo' : 'Inativo'"></span>
                        </td>
                        <td th:text="${u.criadoEm != null} ? ${#temporals.format(u.criadoEm, 'dd/MM/yyyy')} : '-'"></td>
                        <td class="actions">
                            <a th:href="@{/admin/usuarios/editar/{id}(id=${u.id})}"
                               class="btn btn-warning btn-xs">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form th:action="@{/admin/usuarios/excluir/{id}(id=${u.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('Excluir usuário?')">
                                <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-danger btn-xs">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
