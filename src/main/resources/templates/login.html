<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – Sistema de Custo de Serviço</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="login-body">

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <img src="https://atitudegrupo.com.br/wp-content/uploads/2026/05/LogoAtitude-.png" alt="Atitude Grupo" />
            </div>
            <h1>Custo de Serviço</h1>
            <p>Sistema de Gestão de Custos Mensais</p>
        </div>

        <div class="alert alert-danger" th:if="${errorMsg}" th:text="${errorMsg}"></div>
        <div class="alert alert-success" th:if="${logoutMsg}" th:text="${logoutMsg}"></div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Usuário</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Digite seu usuário" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Digite sua senha" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <div class="login-hints">
            <small><strong>Admin:</strong> admin / admin123</small><br/>
            <small><strong>Usuário:</strong> usuario / user123</small>
        </div>
    </div>
</div>

</body>
</html>
