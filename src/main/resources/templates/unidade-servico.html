<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Unidade de Serviço – CustoServico</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        .func-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .func-porteiro { background:#dbeafe; color:#1d4ed8; }
        .func-asg      { background:#dcfce7; color:#166534; }

        .fard-row { background:#f8fafc; }
        .fard-row td { padding:0 !important; border-bottom:2px solid #e2e8f0; }
        .fard-container { padding: 16px 24px 20px 40px; border-top: 1px dashed #cbd5e1; }
        .fard-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
        .fard-header-left { display:flex; align-items:center; gap:10px; font-weight:600; font-size:14px; color:var(--text-primary); }
        .fard-header-left i { color:var(--primary); }

        .status-entregue   { background:#dcfce7; color:#166534; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .status-pendente   { background:#fef3c7; color:#92400e; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .status-sem-estoque{ background:#fee2e2; color:#991b1b; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }

        .fard-table { width:100%; border-collapse:collapse; font-size:13px; background:#fff; border-radius:8px; overflow:hidden; border:1px solid #e2e8f0; }
        .fard-table th { padding:8px 14px; text-align:left; font-weight:600; font-size:11px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; background:#f1f5f9; border-bottom:1px solid #e2e8f0; }
        .fard-table td { padding:10px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
        .fard-table tbody tr:last-child td { border-bottom:none; }
        .fard-table tbody tr:hover { background:#f8fafc; }

        .estoque-badge { font-weight:700; font-size:14px; }
        .estoque-ok   { color:var(--success); }
        .estoque-low  { color:var(--warning); }
        .estoque-zero { color:var(--danger); }

        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:#fff; border-radius:14px; padding:28px 32px; width:100%; max-width:500px; box-shadow:0 20px 40px rgba(0,0,0,.2); }
        .modal-box h3 { font-size:17px; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
        .modal-box h3 i { color:var(--primary); }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

        .btn-fard { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; transition:all .15s; }
        .btn-fard:hover, .btn-fard.ativo { background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
        .btn-fard i { margin-right:4px; }
        .btn-entregar { background:#dcfce7; color:#166534; border:1px solid #bbf7d0; }
        .btn-entregar:hover { background:#16a34a; color:#fff; border-color:#16a34a; }
        .btn-devolver { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
        .btn-devolver:hover { background:#dc2626; color:#fff; border-color:#dc2626; }

        .data-chip { font-size:11px; color:var(--text-secondary); margin-left:6px; }

        /* Seletor de tamanho inline */
        .tamanho-picker { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
        .tamanho-chip {
            padding: 4px 8px; border-radius: 6px; border: 1px solid #cbd5e1; background:#f8fafc;
            font-size: 12px; font-weight: 600; cursor: pointer; line-height: 1.3;
            display:flex; flex-direction:column; align-items:center; gap:1px; min-width:40px;
            transition: all .15s;
        }
        .tamanho-chip:hover:not(:disabled) { background:#16a34a; color:#fff; border-color:#16a34a; }
        .tamanho-chip:disabled { opacity:.4; cursor:default; }
        .tamanho-chip .chip-label { font-size:11px; }
        .tamanho-chip .chip-qty { font-size:10px; color:var(--text-secondary); }
        .tamanho-chip:hover:not(:disabled) .chip-qty { color:#dcfce7; }
        .tamanho-chip-zero { border-color:#fca5a5; color:#991b1b; }
        .picker-label { font-size:11px; color:var(--text-secondary); white-space:nowrap; }
    </style>
</head>
<body>

<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://atitudegrupo.com.br/wp-content/uploads/2026/05/LogoAtitude-.png" alt="Atitude Serviço" class="sidebar-logo" />
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/dashboard}" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a th:href="@{/custos/novo}" class="nav-item">
                <i class="fas fa-plus-circle"></i> Novo Custo
            </a>
            <a th:href="@{/admin/usuarios}" sec:authorize="hasRole('SUPER_ADMIN')" class="nav-item">
                <i class="fas fa-users-cog"></i> Usuários
            </a>
            <a th:href="@{/unidade-servico}" class="nav-item active">
                <i class="fas fa-id-badge"></i> Unidade de Serviço
            </a>
            <a th:href="@{/fardamento-estoque}" class="nav-item">
                <i class="fas fa-tshirt"></i> Fardamento
            </a>
            <a th:href="@{/logout}" class="nav-item nav-item-logout"
               onclick="return confirm('Deseja sair?')">
                <i class="fas fa-sign-out-alt"></i> Sair
            </a>
        </nav>
        <div class="sidebar-footer">
            <i class="fas fa-user-circle"></i>
            <span th:text="${nomeUsuario}"></span>
            <span class="badge-role" th:if="${isAdmin}">ADMIN</span>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <div class="page-header">
            <h2><i class="fas fa-id-badge"></i> Unidade de Serviço</h2>
            <div class="header-actions">
                <button class="btn btn-primary btn-sm" onclick="abrirModalNovo()">
                    <i class="fas fa-plus"></i> Novo Funcionário
                </button>
            </div>
        </div>

        <div id="alertBox" class="alert" style="display:none"></div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-users"></i> Funcionários Ativos</h3>
                <span id="totalFuncionarios" style="font-size:13px;color:var(--text-secondary)"></span>
            </div>
            <div class="card-body table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Função</th>
                            <th>Posto de Trabalho</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyFuncionarios">
                        <tr>
                            <td colspan="6" style="text-align:center;padding:40px;color:var(--text-secondary)">
                                Carregando...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- MODAL CADASTRO / EDIÇÃO -->
<div class="modal-overlay" id="modalFuncionario">
    <div class="modal-box">
        <h3><i class="fas fa-user-plus"></i> <span id="modalTitulo">Novo Funcionário</span></h3>
        <input type="hidden" id="funcionarioId"/>

        <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="fNome" class="form-control" placeholder="Nome completo"/>
        </div>
        <div class="form-row">
            <div class="form-col">
                <label>CPF *</label>
                <input type="text" id="fCpf" class="form-control" placeholder="000.000.000-00" maxlength="14"/>
            </div>
            <div class="form-col">
                <label>Função *</label>
                <select id="fFuncao" class="form-control">
                    <option value="">Selecione</option>
                    <option value="PORTEIRO">Porteiro</option>
                    <option value="ASG">ASG (Zelador)</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Posto de Trabalho *</label>
            <input type="text" id="fPosto" class="form-control" placeholder="Ex: Portaria Principal"/>
        </div>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="salvarFuncionario()">
                <i class="fas fa-save"></i> Salvar
            </button>
        </div>
    </div>
</div>

<script>
const API = '/api';
const FUNCAO_LABEL = { PORTEIRO: 'Porteiro', ASG: 'ASG (Zelador)' };
const FUNCAO_CLASS = { PORTEIRO: 'func-porteiro', ASG: 'func-asg' };

let fardamentoAberto = null;
const cacheItensFuncao   = {};
const cacheTamanhosPorItem = {};

// ── Alertas ─────────────────────────────────────────────────────────────────
function showAlert(tipo, msg) {
    const box = document.getElementById('alertBox');
    box.className = 'alert ' + (tipo === 'success' ? 'alert-success' : 'alert-danger');
    box.textContent = msg;
    box.style.display = 'flex';
    setTimeout(() => { box.style.display = 'none'; }, 4000);
}

// ── Formatação CPF ───────────────────────────────────────────────────────────
document.getElementById('fCpf').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').slice(0, 11);
    v = v.replace(/(\d{3})(\d)/, '$1.$2')
         .replace(/(\d{3})(\d)/, '$1.$2')
         .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    this.value = v;
});

// ── Carregar funcionários ────────────────────────────────────────────────────
async function carregarFuncionarios(expandirId) {
    const res  = await fetch(API + '/funcionarios');
    const lista = await res.json();
    const tbody = document.getElementById('tbodyFuncionarios');
    document.getElementById('totalFuncionarios').textContent = lista.length + ' funcionário(s)';

    if (lista.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-secondary)">
            <i class="fas fa-inbox" style="font-size:32px;opacity:.4;display:block;margin-bottom:8px"></i>
            Nenhum funcionário cadastrado.</td></tr>`;
        return;
    }

    tbody.innerHTML = lista.map(f => `
        <tr id="func-row-${f.id}">
            <td>${f.id}</td>
            <td><strong>${f.nome}</strong></td>
            <td style="font-family:monospace">${f.cpf}</td>
            <td><span class="func-badge ${FUNCAO_CLASS[f.funcao] || ''}">${FUNCAO_LABEL[f.funcao] || f.funcao}</span></td>
            <td>${f.postoDeTrabalho}</td>
            <td class="actions">
                <button class="btn-fard" id="btn-fard-${f.id}"
                    onclick="toggleFardamento(${f.id}, '${f.funcao}', '${f.nome}')"
                    title="Ver fardamento">
                    <i class="fas fa-tshirt"></i> Fardamento
                </button>
                <button class="btn btn-warning btn-xs" onclick="abrirModalEditar(${f.id})" title="Editar">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-danger btn-xs" onclick="excluirFuncionario(${f.id})" title="Remover">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>
        <tr id="fard-row-${f.id}" class="fard-row" style="display:none">
            <td colspan="6">
                <div class="fard-container" id="fard-container-${f.id}">
                    <span style="color:var(--text-secondary);font-size:13px"><i class="fas fa-spinner fa-spin"></i> Carregando fardamento...</span>
                </div>
            </td>
        </tr>`).join('');

    if (expandirId) {
        const f = lista.find(x => x.id === expandirId);
        if (f) toggleFardamento(f.id, f.funcao, f.nome);
    }
}

// ── Toggle fardamento section ────────────────────────────────────────────────
async function toggleFardamento(funcionarioId, funcao, nome) {
    const fardRow   = document.getElementById('fard-row-' + funcionarioId);
    const btn       = document.getElementById('btn-fard-' + funcionarioId);
    const container = document.getElementById('fard-container-' + funcionarioId);

    if (fardamentoAberto && fardamentoAberto !== funcionarioId) {
        document.getElementById('fard-row-' + fardamentoAberto).style.display = 'none';
        const btnAnterior = document.getElementById('btn-fard-' + fardamentoAberto);
        if (btnAnterior) btnAnterior.classList.remove('ativo');
    }

    if (fardRow.style.display !== 'none') {
        fardRow.style.display = 'none';
        btn.classList.remove('ativo');
        fardamentoAberto = null;
        return;
    }

    fardRow.style.display = 'table-row';
    btn.classList.add('ativo');
    fardamentoAberto = funcionarioId;
    await renderizarFardamentoFuncionario(funcionarioId, funcao, nome, container);
}

// ── Renderizar fardamento do funcionário ─────────────────────────────────────
async function renderizarFardamentoFuncionario(funcionarioId, funcao, nome, container) {
    container.innerHTML = '<span style="color:var(--text-secondary);font-size:13px"><i class="fas fa-spinner fa-spin"></i> Carregando...</span>';

    if (!cacheItensFuncao[funcao]) {
        const r = await fetch(API + '/fardamento/funcao/' + funcao);
        cacheItensFuncao[funcao] = await r.json();
    }
    const itensFuncao = cacheItensFuncao[funcao];

    // Busca tamanhos para itens com tipoTamanho != NENHUM
    await Promise.all(itensFuncao
        .filter(i => i.tipoTamanho && i.tipoTamanho !== 'NENHUM' && !cacheTamanhosPorItem[i.id])
        .map(async i => {
            const r = await fetch(API + '/fardamento/' + i.id + '/tamanhos');
            cacheTamanhosPorItem[i.id] = await r.json();
        }));

    const resEntregas = await fetch(API + '/entregas/funcionario/' + funcionarioId);
    const entregas    = await resEntregas.json();
    const entregaMap  = {};
    entregas.forEach(e => { entregaMap[e.itemFardamento.id] = e; });

    if (itensFuncao.length === 0) {
        container.innerHTML = `
            <div class="fard-header">
                <div class="fard-header-left"><i class="fas fa-tshirt"></i> Fardamento — ${nome}</div>
            </div>
            <p style="color:var(--text-secondary);font-size:13px">Nenhum item cadastrado para <strong>${FUNCAO_LABEL[funcao]}</strong>.
            <a href="/fardamento-estoque" style="color:var(--primary)">Cadastrar itens</a></p>`;
        return;
    }

    const totalItens     = itensFuncao.length;
    const totalEntregues = itensFuncao.filter(i => entregaMap[i.id]?.entregue).length;

    const linhas = itensFuncao.map(item => {
        const entrega  = entregaMap[item.id];
        const entregue = entrega?.isEntregue ?? entrega?.entregue ?? false;
        const tamanhoEntregue = entrega?.tamanho || '';
        const dataStr  = entrega?.dataEntrega
            ? `<span class="data-chip"><i class="fas fa-calendar-check"></i> ${formatarData(entrega.dataEntrega)}</span>`
            : '';

        let statusHtml;
        if (entregue) {
            const tam = tamanhoEntregue ? ` — Tam. <strong>${tamanhoEntregue}</strong>` : '';
            statusHtml = `<span class="status-entregue"><i class="fas fa-check"></i> Entregue${tam}</span>${dataStr}`;
        } else if (item.quantidade === 0) {
            statusHtml = `<span class="status-sem-estoque"><i class="fas fa-exclamation-triangle"></i> Sem estoque</span>`;
        } else {
            statusHtml = `<span class="status-pendente"><i class="fas fa-clock"></i> Pendente</span>`;
        }

        let estoqueClass = 'estoque-ok';
        if (item.quantidade === 0) estoqueClass = 'estoque-zero';
        else if (item.quantidade <= 2) estoqueClass = 'estoque-low';

        let acaoHtml;
        if (entregue) {
            acaoHtml = `<button class="btn btn-xs btn-devolver"
                onclick="devolverItem(${entrega.id}, ${funcionarioId}, '${funcao}', '${nome}')">
                <i class="fas fa-undo"></i> Devolver
            </button>`;
        } else if (item.tipoTamanho && item.tipoTamanho !== 'NENHUM') {
            // Picker de tamanho inline
            const tamanhos = cacheTamanhosPorItem[item.id] || [];
            const chips = tamanhos.map(t => {
                const zeroClass = t.quantidade === 0 ? 'tamanho-chip-zero' : '';
                return `<button class="tamanho-chip ${zeroClass}"
                    ${t.quantidade === 0 ? 'disabled' : ''}
                    onclick="entregarItemComTamanho(${funcionarioId}, ${item.id}, '${t.tamanho}', '${funcao}', '${nome}')"
                    title="${t.quantidade === 0 ? 'Sem estoque' : 'Entregar tamanho ' + t.tamanho}">
                    <span class="chip-label">${t.tamanho}</span>
                    <span class="chip-qty">${t.quantidade} un</span>
                </button>`;
            }).join('');
            acaoHtml = `<div class="tamanho-picker">
                <span class="picker-label"><i class="fas fa-ruler"></i> Escolha o tamanho:</span>
                ${chips}
            </div>`;
        } else {
            const disabled = item.quantidade === 0 ? 'disabled title="Sem estoque"' : '';
            acaoHtml = `<button class="btn btn-xs btn-entregar"
                onclick="entregarItemSimples(${funcionarioId}, ${item.id}, '${funcao}', '${nome}')" ${disabled}>
                <i class="fas fa-hand-holding"></i> Entregar
            </button>`;
        }

        return `<tr>
            <td><strong>${item.nome}</strong></td>
            <td style="color:var(--text-secondary)">${item.unidade}</td>
            <td><span class="estoque-badge ${estoqueClass}">${item.quantidade}</span></td>
            <td>${statusHtml}</td>
            <td>${acaoHtml}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `
        <div class="fard-header">
            <div class="fard-header-left">
                <i class="fas fa-tshirt"></i>
                Fardamento — <strong>${nome}</strong>
                <span class="func-badge ${FUNCAO_CLASS[funcao] || ''}" style="margin-left:4px">${FUNCAO_LABEL[funcao]}</span>
            </div>
            <span style="font-size:12px;color:var(--text-secondary)">
                ${totalEntregues} de ${totalItens} item(s) entregue(s)
            </span>
        </div>
        <table class="fard-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Unidade</th>
                    <th><i class="fas fa-boxes"></i> Em Estoque</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>${linhas}</tbody>
        </table>`;
}

// ── Entrega sem tamanho ──────────────────────────────────────────────────────
async function entregarItemSimples(funcionarioId, itemId, funcao, nome) {
    await _executarEntrega(funcionarioId, itemId, '', funcao, nome);
}

// ── Entrega com tamanho ──────────────────────────────────────────────────────
async function entregarItemComTamanho(funcionarioId, itemId, tamanho, funcao, nome) {
    await _executarEntrega(funcionarioId, itemId, tamanho, funcao, nome);
}

async function _executarEntrega(funcionarioId, itemId, tamanho, funcao, nome) {
    const res = await fetch(API + '/entregas/entregar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ funcionarioId, itemFardamentoId: itemId, tamanho })
    });
    const data = await res.json();
    if (res.ok) {
        delete cacheItensFuncao[funcao];
        delete cacheTamanhosPorItem[itemId];
        const container = document.getElementById('fard-container-' + funcionarioId);
        await renderizarFardamentoFuncionario(funcionarioId, funcao, nome, container);
        const msg = tamanho ? `Tamanho ${tamanho} entregue! Estoque atualizado.` : 'Item entregue! Estoque atualizado.';
        showAlert('success', msg);
    } else {
        showAlert('danger', data?.erro || 'Erro ao registrar entrega. Verifique o estoque.');
    }
}

// ── Devolução ────────────────────────────────────────────────────────────────
async function devolverItem(entregaId, funcionarioId, funcao, nome) {
    if (!confirm('Confirmar devolução deste item ao estoque?')) return;
    const res = await fetch(API + '/entregas/devolver/' + entregaId, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
        delete cacheItensFuncao[funcao];
        // Invalida tamanhos do item devolvido
        if (data?.itemFardamento?.id) delete cacheTamanhosPorItem[data.itemFardamento.id];
        const container = document.getElementById('fard-container-' + funcionarioId);
        await renderizarFardamentoFuncionario(funcionarioId, funcao, nome, container);
        showAlert('success', 'Item devolvido ao estoque.');
    } else {
        showAlert('danger', data?.erro || 'Erro ao registrar devolução.');
    }
}

// ── Modal cadastro / edição ──────────────────────────────────────────────────
function abrirModalNovo() {
    document.getElementById('funcionarioId').value = '';
    document.getElementById('modalTitulo').textContent = 'Novo Funcionário';
    document.getElementById('fNome').value = '';
    document.getElementById('fCpf').value = '';
    document.getElementById('fFuncao').value = '';
    document.getElementById('fPosto').value = '';
    document.getElementById('modalFuncionario').classList.add('open');
}

async function abrirModalEditar(id) {
    const res = await fetch(API + '/funcionarios/' + id);
    const f   = await res.json();
    document.getElementById('funcionarioId').value = f.id;
    document.getElementById('modalTitulo').textContent = 'Editar Funcionário';
    document.getElementById('fNome').value  = f.nome;
    document.getElementById('fCpf').value   = f.cpf;
    document.getElementById('fFuncao').value = f.funcao;
    document.getElementById('fPosto').value  = f.postoDeTrabalho;
    document.getElementById('modalFuncionario').classList.add('open');
}

function fecharModal() {
    document.getElementById('modalFuncionario').classList.remove('open');
}

async function salvarFuncionario() {
    const id      = document.getElementById('funcionarioId').value;
    const payload = {
        nome:            document.getElementById('fNome').value.trim(),
        cpf:             document.getElementById('fCpf').value.trim(),
        funcao:          document.getElementById('fFuncao').value,
        postoDeTrabalho: document.getElementById('fPosto').value.trim()
    };

    if (!payload.nome || !payload.cpf || !payload.funcao || !payload.postoDeTrabalho) {
        showAlert('danger', 'Preencha todos os campos obrigatórios.');
        return;
    }

    const url    = id ? API + '/funcionarios/' + id : API + '/funcionarios';
    const method = id ? 'PUT' : 'POST';

    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (res.ok) {
        const salvo = await res.json();
        fecharModal();
        showAlert('success', id ? 'Funcionário atualizado!' : 'Funcionário cadastrado! Veja o fardamento abaixo.');
        await carregarFuncionarios(salvo.id);
    } else {
        showAlert('danger', 'Erro ao salvar. CPF já cadastrado?');
    }
}

async function excluirFuncionario(id) {
    if (!confirm('Deseja inativar este funcionário?')) return;
    const res = await fetch(API + '/funcionarios/' + id, { method: 'DELETE' });
    if (res.ok) {
        showAlert('success', 'Funcionário removido.');
        await carregarFuncionarios(null);
    } else {
        showAlert('danger', 'Erro ao remover funcionário.');
    }
}

// ── Formatação de data ───────────────────────────────────────────────────────
function formatarData(dataArr) {
    if (!dataArr) return '';
    if (Array.isArray(dataArr)) {
        const [a, m, d] = dataArr;
        return String(d).padStart(2,'0') + '/' + String(m).padStart(2,'0') + '/' + a;
    }
    const [a, m, d] = dataArr.split('-');
    return d + '/' + m + '/' + a;
}

document.getElementById('modalFuncionario').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
});

carregarFuncionarios(null);
</script>
